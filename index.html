<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal 3D Survival</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="hud">
      <div class="stat">❤️ Health: <span id="health">100</span></div>
      <div class="stat">🔥 Energy: <span id="energy">100</span></div>
      <div class="stat">🌾 Food: <span id="food">0</span></div>
      <div class="stat">Day <span id="day">1</span> — <span id="time">Morning</span></div>
      <div class="stat">Press WASD to move, space to dash.</div>
    </div>
    <canvas id="game"></canvas>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
